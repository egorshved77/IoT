# Version: ESP32

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps = 
    adafruit/Adafruit NeoPixel @ ^1.11.0
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.4.1
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.15
    ESP mDNS
